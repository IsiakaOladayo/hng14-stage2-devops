version: "3.9"

services:
  redis:
    image: redis:alpine
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: always

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=job

  api:
    build: ./api

    ports:
    - "8000:8000"   # ✅ THIS IS REQUIRED

    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=job
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=job
     env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - REDIS_HOST=redis
      - QUEUE_NAME=job
     env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
networks:
  appnet:
