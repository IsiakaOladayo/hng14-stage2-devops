version: "3.9"

services:
  redis:
    image: redis:alpine
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=job
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=job
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
networks:
  appnet:
