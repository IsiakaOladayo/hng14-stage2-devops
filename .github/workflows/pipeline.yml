name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python
        run: |
          pip install flake8
          flake8 .

      - name: Lint JS
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2 || true

      - name: Wait for registry
        run: sleep 5

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} \
                       -t localhost:5000/api:latest ./api

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} \
                       -t localhost:5000/worker:latest ./worker

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} \
                       -t localhost:5000/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:latest

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild images (for scanning)
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-api.sarif

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: worker:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-worker.sarif

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload SARIF reports
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

      - name: Upload Worker SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Test full job flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')

          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy (Simulated)
        run: echo "Deploy successful"

      - name: Rolling update simulation
        run: |
          docker compose up -d --no-deps --build api
          sleep 10