name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Python
        run: |
          pip install flake8
          flake8 . || true

      - name: Lint JS
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build API image
        run: docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api

      - name: Build Worker image
        run: docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/api:latest ./worker

      - name: Build Frontend image
        run: docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/api:latest ./frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild API image
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Rebuild Worker image
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Rebuild Frontend image
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-api.sarif

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-worker.sarif

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-frontend.sarif
      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
     - name: Upload WORKER SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
     - name: Upload FRONTEND SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
      - name: Upload Trivy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Test flow
        run: |
          curl -X POST http://localhost:3000/submit

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulated deploy
        run: echo "Deploy successful"
      - name: Deploy with rolling update
        run: |
          docker compose up -d --no-deps --build api
          sleep 10
